name: "💡 Feature Request"
description: "Suggest a new feature or improvement for Local LLM Council"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make Local LLM Council even better? We'd love to hear it!
  - type: textarea
    id: feature-description
    attributes:
      label: Describe the Feature Idea
      description: What would you like to see added?
      placeholder: E.g. support Llama.cpp native endpoints directly...
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: What is the Use Case?
      description: Explain why this feature is useful and who it benefits.
    validations:
      required: true
  - type: textarea
    id: alternative-solutions
    attributes:
      label: Alternative Solutions Considered
      description: Any alternative ways or workarounds you've thought of.
