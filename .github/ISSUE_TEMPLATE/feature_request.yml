name: Feature request
description: Suggest a product, model, ops, or developer-experience improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow or project limitation does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI / UX
        - Orchestration
        - Local models / Ollama
        - Security
        - Ops / Packaging
        - Docs
        - Tests / Eval
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Optional. Mention workarounds or other designs.
