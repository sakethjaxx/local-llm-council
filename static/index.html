<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Council - Universal Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    :root {
      --bg: #030305;
      --surface: rgba(15, 15, 20, 0.7);
      --surface-hover: rgba(25, 25, 35, 0.8);
      --border: rgba(0, 240, 255, 0.15);
      --border-bright: rgba(0, 240, 255, 0.5);
      --text: #E8E8EE;
      --muted: #8A8A9E;
      --cyan: #00f0ff;
      --pink: #ff00ff;
      --chairman: #FFD700;
      --danger: #ff3366;
      --glass: blur(12px);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── CYBERPUNK GRID & GLOW ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: -1;
    }

    .ambient-glow {
      position: fixed;
      top: -10vw;
      right: -10vw;
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, rgba(0, 240, 255, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      filter: blur(50px);
    }
    .ambient-glow-2 {
      position: fixed;
      bottom: -10vw;
      left: -10vw;
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, rgba(255, 0, 255, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      filter: blur(50px);
    }

    /* ── HEADER ── */
    header {
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: rgba(3, 3, 5, 0.8);
      backdrop-filter: var(--glass);
      display: flex;
      align-items: center;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-mark {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 24px;
      color: var(--cyan);
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
      border: 1px solid var(--border-bright);
      padding: 5px 12px;
      border-radius: 4px;
      background: rgba(0, 240, 255, 0.05);
    }

    .title-group h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
    }

    .title-group p {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      color: var(--pink);
      letter-spacing: 0.1em;
      margin-top: 2px;
    }

    .header-actions {
      margin-left: auto;
    }

    /* ── MAIN LAYOUT ── */
    main {
      display: grid;
      grid-template-columns: 420px 1fr;
      flex: 1;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

    /* ── LEFT PANEL: CONFIG ── */
    .config-panel {
      border-right: 1px solid var(--border);
      background: rgba(3, 3, 5, 0.6);
      backdrop-filter: var(--glass);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      height: calc(100vh - 85px);
      overflow-y: auto;
    }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      color: var(--cyan);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    textarea, input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      padding: 12px;
      transition: all 0.3s;
    }
    textarea:focus, input[type="text"]:focus {
      outline: none;
      border-color: var(--cyan);
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
    }
    textarea { min-height: 120px; resize: vertical; }

    .btn {
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 4px;
      text-transform: uppercase;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover {
      background: rgba(0, 240, 255, 0.1);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
    }
    .btn-solid {
      background: var(--cyan);
      color: #000;
    }
    .btn-solid:hover {
      background: #fff;
      border-color: #fff;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
    }
    .btn-small { padding: 4px 8px; font-size: 10px; }

    /* ── SEAT BUILDER ── */
    .seat-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .seat-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      position: relative;
    }
    .seat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .seat-dot {
      width: 10px; height: 10px; border-radius: 50%;
      box-shadow: 0 0 8px currentColor;
    }
    .seat-title { font-weight: 600; font-size: 15px; }
    .seat-model { font-family: 'Fira Code', monospace; font-size: 11px; color: var(--muted); }
    .seat-remove {
      position: absolute; top: 12px; right: 12px;
      color: var(--danger); cursor: pointer; font-size: 12px;
    }
    .seat-edit-fields {
      display: flex; flex-direction: column; gap: 8px;
      margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border);
    }

    /* ── RIGHT PANEL: COUNCIL ── */
    .council-panel {
      padding: 40px;
      height: calc(100vh - 85px);
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .phase-banner {
      display: inline-flex;
      align-items: center;
      gap: 15px;
      padding: 10px 20px;
      border: 1px solid var(--pink);
      background: rgba(255, 0, 255, 0.05);
      border-radius: 4px;
      margin: 30px 0 20px 0;
      box-shadow: 0 0 15px rgba(255, 0, 255, 0.1);
    }
    .phase-banner span { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--pink); letter-spacing: 2px;}

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .council-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      backdrop-filter: var(--glass);
      transition: all 0.3s;
    }
    .council-card:hover { border-color: var(--border-bright); transform: translateY(-2px); }
    
    .chairman-card {
      background: linear-gradient(145deg, rgba(255, 215, 0, 0.1), rgba(15, 15, 20, 0.9));
      border: 1px solid var(--chairman);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.15);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    .card-icon { font-size: 20px; }
    .card-name { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; }
    
    .card-body {
      font-size: 15px;
      line-height: 1.6;
      color: #D0D0E0;
    }
    .card-body h1, .card-body h2, .card-body h3 {
      font-family: 'Rajdhani', sans-serif;
      color: #fff;
      margin: 16px 0 8px 0;
    }
    .card-body strong { color: var(--cyan); }
    .card-body ul { padding-left: 20px; margin-bottom: 12px; }
    .card-body li { margin-bottom: 4px; }

    /* ── DEBATE MODE / CHAT ── */
    .debate-panel {
      margin-top: 40px;
      padding: 24px;
      background: rgba(0, 240, 255, 0.05);
      border: 1px solid var(--cyan);
      border-radius: 8px;
      display: none;
    }
    .debate-header {
      font-family: 'Orbitron', sans-serif;
      color: var(--cyan);
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-history {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 20px;
      max-height: 400px;
      overflow-y: auto;
    }
    .chat-msg {
      padding: 12px 16px;
      border-radius: 6px;
      max-width: 85%;
    }
    .chat-user {
      background: var(--surface);
      border: 1px solid var(--border);
      align-self: flex-end;
    }
    .chat-agent {
      background: rgba(0, 240, 255, 0.08);
      border: 1px solid var(--cyan);
      align-self: flex-start;
    }
    .chat-input-row {
      display: flex;
      gap: 12px;
    }
    .chat-select {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--cyan);
      padding: 10px;
      font-family: 'Fira Code', monospace;
      outline: none;
    }

    /* ── TYPING INDICATOR ── */
    .typing { display: flex; gap: 4px; padding: 10px 0; }
    .typing span {
      width: 6px; height: 6px; background: var(--cyan); border-radius: 50%;
      animation: blink 1.4s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

    /* ── MEMORY MODAL ── */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px);
      z-index: 1000; display: none; align-items: center; justify-content: center;
    }
    .modal-content {
      background: var(--surface); border: 1px solid var(--cyan);
      border-radius: 8px; width: 80vw; height: 80vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-header {
      padding: 16px; border-bottom: 1px solid var(--cyan);
      display: flex; justify-content: space-between; align-items: center;
      font-family: 'Orbitron', sans-serif; color: var(--cyan);
    }
    #memoryNetwork { flex: 1; background: #000; }

  </style>
</head>

<body>
  <div class="ambient-glow"></div>
  <div class="ambient-glow-2"></div>

  <header>
    <div class="logo-mark">SYS_OP</div>
    <div class="title-group">
      <h1>UNIVERSAL COUNCIL ENGINE</h1>
      <p>MULTI-AGENT REASONING FRAMEWORK v2.0</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-small" onclick="viewMemory()">[ VIEW LONG-TERM MEMORY GRAPH ]</button>
    </div>
  </header>

  <main>
    <!-- LEFT PANEL: CONFIG -->
    <aside class="config-panel">
      
      <div>
        <div class="section-title">1. Context / Topic</div>
        <textarea id="topicText" placeholder="Enter the topic, code, or proposal for the council to review..."></textarea>
      </div>

      <div>
        <div class="section-title">
          2. Council Roster 
          <button class="btn btn-small" onclick="addSeat()">+ Add Seat</button>
        </div>
        <div class="seat-list" id="seatList">
          <!-- Populated via JS -->
        </div>
      </div>

      <button class="btn btn-solid" id="launchBtn" onclick="launchCouncil()" style="margin-top: 20px; font-size: 16px; padding: 15px;">
        INITIALIZE COUNCIL
      </button>

    </aside>

    <!-- RIGHT PANEL: OUTPUT -->
    <section class="council-panel" id="councilPanel">
      <div style="text-align: center; color: var(--muted); margin-top: 20vh; font-family: 'Fira Code', monospace;">
        > AWAITING INITIALIZATION...
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="memoryModal">
    <div class="modal-content">
      <div class="modal-header">
        <span>> KNOWLEDGE GRAPH (LONG-TERM MEMORY)</span>
        <button class="btn btn-small" onclick="closeMemory()">X</button>
      </div>
      <div id="memoryNetwork"></div>
    </div>
  </div>

  <script>
    // ── STATE ──
    let councilConfig = {
      "arch": { label: "Architect (DeepSeek)", model: "openrouter/deepseek/deepseek-r1", color: "#00f0ff", icon: "🐋", persona: "You are a systems architect. Focus on scale and security." },
      "prod": { label: "Product (Llama)", model: "openrouter/meta-llama/llama-3.3-70b-instruct", color: "#ff00ff", icon: "🦙", persona: "You are a product manager. Focus on UX and business value." },
      "chairman": { label: "Chairman (GPT-4o)", model: "openrouter/meta-llama/llama-3.3-70b-instruct", color: "#FFD700", icon: "👑", persona: "You are the Chairman. Synthesize and make a final verdict." }
    };

    let chatHistory = [];
    let rawCardContents = {};
    let thinkingCards = {};
    let ph2Section, ph3Section;

    // ── SEAT BUILDER UI ──
    function renderSeats() {
      const list = document.getElementById('seatList');
      list.innerHTML = '';
      for (const [id, seat] of Object.entries(councilConfig)) {
        const isChairman = id === 'chairman';
        const div = document.createElement('div');
        div.className = 'seat-item';
        div.innerHTML = `
          <div class="seat-header">
            <div class="seat-dot" style="background: ${seat.color}; color: ${seat.color}"></div>
            <div class="seat-title">${seat.icon} ${seat.label}</div>
            <div class="seat-model">${seat.model.split('/').pop()}</div>
            ${!isChairman ? `<div class="seat-remove" onclick="removeSeat('${id}')">✕</div>` : ''}
          </div>
          <div class="seat-edit-fields">
            <input type="text" value="${seat.persona}" onchange="updateSeat('${id}', 'persona', this.value)" placeholder="System Persona Prompt">
          </div>
        `;
        list.appendChild(div);
      }
    }

    function addSeat() {
      const id = 'seat_' + Math.floor(Math.random() * 1000);
      councilConfig[id] = {
        label: "New Expert",
        model: "openrouter/meta-llama/llama-3.3-70b-instruct",
        color: "#" + Math.floor(Math.random()*16777215).toString(16),
        icon: "🤖",
        persona: "You are an expert."
      };
      renderSeats();
    }

    function removeSeat(id) {
      delete councilConfig[id];
      renderSeats();
    }

    function updateSeat(id, field, value) {
      if(councilConfig[id]) councilConfig[id][field] = value;
    }

    renderSeats();

    // ── COUNCIL EXECUTION ──
    async function launchCouncil() {
      const topic = document.getElementById('topicText').value.trim();
      if (!topic) return alert('Enter a topic first.');

      const btn = document.getElementById('launchBtn');
      const panel = document.getElementById('councilPanel');
      btn.disabled = true;
      btn.innerHTML = '> PROCESSING...';

      panel.innerHTML = '';
      rawCardContents = {};
      thinkingCards = {};
      chatHistory = [];

      const formData = new FormData();
      formData.append('topic_text', topic);
      formData.append('council_config', JSON.stringify(councilConfig));

      try {
        const resp = await fetch('/council/stream', { method: 'POST', body: formData });
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try { handleEvent(JSON.parse(line.slice(6)), panel); } catch {}
            }
          }
        }
      } catch (err) {
        panel.innerHTML += `<div style="color:var(--danger)">Error: ${err.message}</div>`;
      }
      
      btn.disabled = false;
      btn.innerHTML = 'INITIALIZE COUNCIL';
    }

    function handleEvent(ev, panel) {
      if (ev.type === 'phase_start') {
        const banner = document.createElement('div');
        banner.className = 'phase-banner';
        banner.innerHTML = `<span>PHASE ${ev.phase} // ${ev.label.toUpperCase()}</span>`;
        panel.appendChild(banner);

        const grid = document.createElement('div');
        grid.className = 'cards-grid';
        grid.id = `grid-phase${ev.phase}`;
        panel.appendChild(grid);

        if (ev.phase === 2) ph2Section = grid;
        if (ev.phase === 3) ph3Section = grid;
        grid.scrollIntoView({ behavior: 'smooth', block: 'end' });
        return;
      }

      if (ev.type === 'member_thinking') {
        const phase = ev.phase || 1;
        const grid = document.getElementById(`grid-phase${phase}`);
        if (!grid) return;

        const card = buildCard(ev.member, ev.meta, null, phase);
        grid.appendChild(card);
        thinkingCards[`${ev.member}-${phase}`] = card;
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        return;
      }

      if (ev.type === 'member_token') {
        let phase = 1;
        if (ph3Section && ph3Section.contains(thinkingCards[`${ev.member}-3`])) phase = 3;
        else if (ph2Section && ph2Section.contains(thinkingCards[`${ev.member}-2`])) phase = 2;
        
        const key = `${ev.member}-${phase}`;
        const existing = thinkingCards[key];
        
        if (existing) {
          const body = existing.querySelector('.card-body');
          const pulse = existing.querySelector('.typing');
          if (pulse) { pulse.remove(); body.style.display = 'block'; }
          
          if (!rawCardContents[key]) rawCardContents[key] = '';
          rawCardContents[key] += ev.chunk;
          body.innerHTML = marked.parse(rawCardContents[key]);
        }
        return;
      }

      if (ev.type === 'done') {
        showDebatePanel(panel);
        return;
      }
    }

    function buildCard(member, meta, content, phase) {
      const isChairman = member === 'chairman';
      const card = document.createElement('div');
      card.className = isChairman ? 'council-card chairman-card' : 'council-card';

      const color = meta.color || '#888';
      card.innerHTML = `
        <div class="card-header">
          <div class="card-icon" style="color:${color}">${meta.icon}</div>
          <div class="card-name" style="color:${color}">${meta.label.toUpperCase()}</div>
        </div>
        <div class="typing"><span></span><span></span><span></span></div>
        <div class="card-body" style="display:none"></div>
      `;
      return card;
    }

    // ── DEBATE MODE & EXPORT ──
    function showDebatePanel(panel) {
      const wrapper = document.createElement('div');
      wrapper.innerHTML = `
        <div class="debate-panel" style="display:block">
          <div class="debate-header">
            <span>> INTERACTIVE DEBATE MODE</span>
            <button class="btn btn-small btn-solid" onclick="exportReport()">EXPORT REPORT</button>
          </div>
          <div class="chat-history" id="chatHistory"></div>
          <div class="chat-input-row">
            <select id="chatTarget" class="chat-select">
              ${Object.entries(councilConfig).map(([id, cfg]) => `<option value="${id}">@${cfg.label}</option>`).join('')}
            </select>
            <input type="text" id="chatInput" placeholder="Ask a question..." onkeypress="if(event.key === 'Enter') sendChat()">
            <button class="btn btn-solid" onclick="sendChat()" id="chatBtn">SEND</button>
          </div>
        </div>
      `;
      panel.appendChild(wrapper);
      wrapper.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    async function sendChat() {
      const input = document.getElementById('chatInput');
      const targetId = document.getElementById('chatTarget').value;
      const msg = input.value.trim();
      if (!msg) return;

      const historyDiv = document.getElementById('chatHistory');
      
      // Add user message
      chatHistory.push({ role: 'user', content: msg });
      const uMsg = document.createElement('div');
      uMsg.className = 'chat-msg chat-user';
      uMsg.textContent = msg;
      historyDiv.appendChild(uMsg);
      input.value = '';

      // Add agent placeholder
      const aMsg = document.createElement('div');
      aMsg.className = 'chat-msg chat-agent';
      aMsg.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
      historyDiv.appendChild(aMsg);
      historyDiv.scrollTop = historyDiv.scrollHeight;

      document.getElementById('chatBtn').disabled = true;

      try {
        const resp = await fetch('/council/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            member_id: targetId,
            messages: chatHistory,
            council_config: councilConfig
          })
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullReply = '';
        aMsg.innerHTML = ''; // clear typing

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const ev = JSON.parse(line.slice(6));
                if (ev.type === 'chat_token') {
                  fullReply += ev.chunk;
                  aMsg.innerHTML = marked.parse(fullReply);
                  historyDiv.scrollTop = historyDiv.scrollHeight;
                }
              } catch {}
            }
          }
        }
        chatHistory.push({ role: 'assistant', content: fullReply });
      } catch (err) {
        aMsg.innerHTML = `<span style="color:red">Error: ${err.message}</span>`;
      }
      document.getElementById('chatBtn').disabled = false;
    }

    function exportReport() {
      let md = "# Universal Council Report\n\n";
      md += "## Topic\n" + document.getElementById('topicText').value + "\n\n";
      
      // Compile raw cards
      for (const [key, content] of Object.entries(rawCardContents)) {
        const [member, phase] = key.split('-');
        const meta = councilConfig[member];
        const phaseName = phase == 1 ? "Analysis" : (phase == 2 ? "Review" : "Verdict");
        md += `## ${meta.label} - Phase ${phase} (${phaseName})\n\n`;
        md += content + "\n\n---\n\n";
      }

      if (chatHistory.length > 0) {
        md += "## Interactive Debate\n\n";
        chatHistory.forEach(msg => {
          md += `**${msg.role.toUpperCase()}**: ${msg.content}\n\n`;
        });
      }

      const blob = new Blob([md], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `council_report_${Date.now()}.md`;
      a.click();
    }

    // ── MEMORY GRAPH VISUALIZATION ──
    async function viewMemory() {
      const modal = document.getElementById('memoryModal');
      modal.style.display = 'flex';
      
      try {
        const resp = await fetch('/council/memory');
        const data = await resp.json();
        
        const container = document.getElementById('memoryNetwork');
        const options = {
          nodes: {
            shape: 'dot', size: 16,
            font: { color: '#E8E8EE', face: 'Rajdhani', size: 14 },
            color: { background: '#00f0ff', border: '#ff00ff' },
            shadow: true
          },
          edges: {
            width: 2,
            color: { color: 'rgba(0, 240, 255, 0.4)', highlight: '#ff00ff' },
            font: { color: '#8A8A9E', face: 'Fira Code', size: 11, align: 'horizontal' },
            arrows: { to: { enabled: true, scaleFactor: 0.5 } },
            smooth: { type: 'continuous' }
          },
          physics: { barnesHut: { gravitationalConstant: -3000, centralGravity: 0.3 } }
        };
        
        new vis.Network(container, data, options);
      } catch (e) {
        console.error(e);
        alert("Failed to load memory graph.");
      }
    }

    function closeMemory() {
      document.getElementById('memoryModal').style.display = 'none';
    }
  </script>
</body>
</html>
